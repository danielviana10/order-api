version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: order_api_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: order_api_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
